# ═══════════════════════════════════════════════════════════════════
# Configuration H2 — base de données en mémoire (POC uniquement)
# ═══════════════════════════════════════════════════════════════════
spring.datasource.url=jdbc:h2:mem:copro;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ═══════════════════════════════════════════════════════════════════
# Spring Modulith — Event Publication Registry (JDBC)
# ═══════════════════════════════════════════════════════════════════
# Crée automatiquement la table EVENT_PUBLICATION au démarrage.
# Cette table persiste les événements publiés et leur état de traitement.
# Si un @ApplicationModuleListener plante, l'événement sera rejoué
# au prochain démarrage de l'application.
spring.modulith.events.jdbc.schema-initialization.enabled=true

# ═══════════════════════════════════════════════════════════════════
# Logs — visualiser les événements inter-contextes
# ═══════════════════════════════════════════════════════════════════
logging.level.org.springframework.modulith=DEBUG
logging.level.com.kouasseu.copro=DEBUG
